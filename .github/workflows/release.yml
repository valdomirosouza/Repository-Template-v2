name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write # REM-007 — sign SLSA build provenance

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history so the version.txt sync step (RFC-0005) can operate on the release branch
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        id: release
        continue-on-error: true # manual releases are used; release-please requires "Allow Actions to create PRs" repo setting
        with:
          release-type: python
          changelog-types: |
            [
              {"type":"feat","section":"Features"},
              {"type":"fix","section":"Bug Fixes"},
              {"type":"security","section":"Security"},
              {"type":"privacy","section":"Privacy"},
              {"type":"perf","section":"Performance"},
              {"type":"docs","section":"Documentation"},
              {"type":"chore","section":"Miscellaneous","hidden":true}
            ]

      - name: Sync version.txt on the release PR (ADR-0057 SoT, RFC-0005)
        # release-please bumps pyproject.toml on its PR branch, but `version.txt` is the
        # single source of truth (ADR-0057). Mirror the bumped version into version.txt on
        # the same branch so the release PR never drifts and the version-consistency gate
        # (pr-governance) stays green. version.txt is consumed raw, so it cannot carry
        # release-please annotation markers — hence this sync rather than `extra-files`.
        # Runs after the action on every push to main, so it survives release-please's
        # force-push; pushing to the release branch does not re-trigger this workflow
        # (it triggers on push to `main` only).
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=release-please--branches--main
          if ! git fetch origin "$BRANCH"; then
            echo "No release PR branch — nothing to sync."; exit 0
          fi
          git checkout "$BRANCH"
          VER="$(grep -m1 -E '^version *= *"' pyproject.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')"
          if [ -z "$VER" ]; then echo "Could not read pyproject version"; exit 0; fi
          if [ "$(cat version.txt 2>/dev/null)" = "$VER" ]; then
            echo "version.txt already consistent ($VER)"; exit 0
          fi
          printf '%s\n' "$VER" > version.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: sync version.txt to $VER (ADR-0057, RFC-0005)"
          git push origin "$BRANCH"
          echo "Synced version.txt -> $VER on $BRANCH"

  build-release-image:
    name: Build and Push Release Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance (SLSA)
        # REM-007 — emit signed SLSA build provenance for the released image (SLSA Build L2+).
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.2

      - name: Sign release image
        run: |
          cosign sign \
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}

      - name: Install Syft and generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft . --output cyclonedx-json=sbom.cyclonedx.json

      - name: Attest SBOM
        run: |
          cosign attest \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: sbom.cyclonedx.json
