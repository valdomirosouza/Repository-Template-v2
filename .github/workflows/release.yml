name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: python
          changelog-types: |
            [
              {"type":"feat","section":"Features"},
              {"type":"fix","section":"Bug Fixes"},
              {"type":"security","section":"Security"},
              {"type":"privacy","section":"Privacy"},
              {"type":"perf","section":"Performance"},
              {"type":"docs","section":"Documentation"},
              {"type":"chore","section":"Miscellaneous","hidden":true}
            ]

  build-release-image:
    name: Build and Push Release Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release image
        run: |
          cosign sign \
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}

      - name: Install Syft and generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft . --output cyclonedx-json=sbom.cyclonedx.json

      - name: Attest SBOM
        run: |
          cosign attest \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: sbom.cyclonedx.json
