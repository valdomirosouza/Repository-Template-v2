name: Secret Scanning

on:
  push:
  pull_request:

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run secret scan
        id: scan
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.git/.*' \
            --exclude-files 'tests/fixtures/.*' \
            > scan-report.json || true
          NEW=$(detect-secrets audit --report scan-report.json 2>/dev/null \
            | grep -c "Potential Secret" || echo "0")
          echo "new_secrets=$NEW" >> "$GITHUB_OUTPUT"

      - name: Fail on new secrets
        if: steps.scan.outputs.new_secrets != '0'
        run: |
          echo "Secret scanning found ${{ steps.scan.outputs.new_secrets }} potential secret(s)."
          echo "Review scan-report.json and update .secrets.baseline after false-positive triage."
          exit 1

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report-${{ github.sha }}
          path: scan-report.json
          retention-days: 30

      - name: Comment on PR with findings
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Secret Scanning Failed\n\nPotential secrets detected. Download the `secret-scan-report` artifact and run `detect-secrets audit` locally to triage findings.\n\nDo **not** commit real credentials. Use `.env.example` with placeholder values only.'
            })
