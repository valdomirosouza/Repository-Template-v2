name: CD — Staging

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy"
        required: true
        type: string

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:staging-${{ inputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install \
            --namespace staging \
            --create-namespace \
            --set image.tag=staging-${{ inputs.sha }} \
            --set environment=staging \
            --wait \
            --timeout 5m \
            app ./infrastructure/helm/api-gateway \
            --values infrastructure/helm/api-gateway/values-staging.yaml

      - name: Run smoke tests
        run: |
          bash infrastructure/scripts/deploy/smoke-test.sh \
            --env staging \
            --base-url ${{ vars.STAGING_BASE_URL }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deploy ${{ job.status }} — SHA ${{ inputs.sha }}"
          # Replace with actual Slack/Teams webhook step
