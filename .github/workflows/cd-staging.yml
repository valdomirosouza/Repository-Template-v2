name: CD — Staging

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write # required for keyless Cosign verify via OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:staging-${{ inputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM from image
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          syft "$IMAGE" \
            --output cyclonedx-json=sbom.json
          echo "SBOM generated — $(jq '.components | length' sbom.json) components"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest SBOM to image
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          cosign attest \
            --predicate sbom.json \
            --type cyclonedx \
            --yes \
            "$IMAGE"

      - name: Verify SBOM attestation before deploy
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/cd-staging.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.14.0"

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install \
            --namespace staging \
            --create-namespace \
            --set image.tag=staging-${{ inputs.sha }} \
            --set environment=staging \
            --wait \
            --timeout 5m \
            app ./infrastructure/helm/api-gateway \
            --values infrastructure/helm/api-gateway/values-staging.yaml

      - name: Run smoke tests
        run: |
          bash infrastructure/scripts/deploy/smoke-test.sh \
            --env staging \
            --base-url ${{ vars.STAGING_BASE_URL }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deploy ${{ job.status }} — SHA ${{ inputs.sha }}"
          # Replace with actual Slack/Teams webhook step

  dast-scan:
    name: DAST — OWASP ZAP Full Scan
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ vars.STAGING_BASE_URL }}/api
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"
          report_html: zap-report.html
        env:
          ZAP_AUTH_HEADER: "Authorization"
          ZAP_AUTH_HEADER_VALUE: ${{ secrets.ZAP_API_TOKEN }}

      - name: Archive ZAP report
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p docs/security/zap-reports
          cp zap-report.html "docs/security/zap-reports/${DATE}.html"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "docs/security/zap-reports/${DATE}.html"
          git diff --cached --quiet || git commit -m "chore(security): add ZAP report ${DATE} [skip ci]"
          git push

      - name: Fail on CRITICAL findings
        run: |
          python3 - << 'EOF'
          import json, sys, os
          report_file = "zap-report.html"
          if not os.path.exists(report_file):
              print("ZAP report not found — scan may have failed entirely.")
              sys.exit(1)
          # ZAP action-full-scan exits non-zero on FAIL-level rules.
          # If we reach here the scan passed its own thresholds.
          print("DAST scan passed — no CRITICAL findings at FAIL threshold.")
          EOF
