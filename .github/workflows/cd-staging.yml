name: CD — Staging

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.9.0

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          push: true
          tags: ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:staging-${{ inputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
        with:
          version: "3.14.0"

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install \
            --namespace staging \
            --create-namespace \
            --set image.tag=staging-${{ inputs.sha }} \
            --set environment=staging \
            --wait \
            --timeout 5m \
            app ./infrastructure/helm/api-gateway \
            --values infrastructure/helm/api-gateway/values-staging.yaml

      - name: Run smoke tests
        run: |
          bash infrastructure/scripts/deploy/smoke-test.sh \
            --env staging \
            --base-url ${{ vars.STAGING_BASE_URL }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deploy ${{ job.status }} — SHA ${{ inputs.sha }}"
          # Replace with actual Slack/Teams webhook step
