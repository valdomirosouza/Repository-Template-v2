name: SBOM — Generate and Attest

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday 03:00 UTC

permissions:
  contents: read
  id-token: write

jobs:
  sbom:
    name: Generate and Sign SBOM
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to container registry
        if: env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate CycloneDX SBOM
        run: |
          syft . \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.2

      - name: Attest SBOM to container image
        if: vars.CONTAINER_REGISTRY != ''
        run: |
          cosign attest \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:${{ github.sha }}

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
            docs/dependency-manifest.yaml
          retention-days: 90
