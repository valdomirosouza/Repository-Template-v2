name: IaC & History Security Scan

# Implements the two shift-left controls ADR-0029 §1 (Checkov IaC scan) and §4 (Gitleaks
# git-history secret scan). Both run REPORT-MODE per ADR-0070 (continue-on-error: true) during
# burn-in; flip to blocking by REMOVING the marked continue-on-error line after the burn-in window
# recorded in docs/governance/gate-lifecycle.md is met (HITL-approved normal-change, ADR-0027).
#
# Pinning note: actions are SHA-pinned (RFC-0015 / check_action_pins.sh). Scanner tooling is
# installed in run-steps (pip / docker) which the pin gate does not cover — matching the repo's
# existing convention (detect-secrets is pip-installed in secret-scanning.yml). The Gitleaks image
# tag is set once below; bump as needed.

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install Checkov
        run: pip install checkov
      - name: Scan infrastructure/ (Terraform, Helm, Kubernetes)
        # REPORT MODE (ADR-0070): surface IaC misconfigurations without blocking during burn-in.
        # Flip to blocking by REMOVING the next line (and dropping --soft-fail).
        continue-on-error: true
        run: |
          checkov --directory infrastructure/ \
            --output cli --compact --quiet --soft-fail \
            || echo "::warning::Checkov reported IaC findings (report-mode — not blocking; see ADR-0029 §1 / gate-lifecycle.md)"

  gitleaks:
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    env:
      # Official Gitleaks image; bump this tag to upgrade. Verify the tag exists before flipping
      # this gate to blocking.
      GITLEAKS_IMAGE: "ghcr.io/gitleaks/gitleaks:v8.18.4"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history — this scan's whole purpose (vs staged-only detect-secrets)
      - name: Scan full git history for secrets
        # REPORT MODE (ADR-0070): warn on historical secrets without blocking during burn-in.
        # Flip to blocking by REMOVING the next line.
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" "$GITLEAKS_IMAGE" \
            detect --source=/repo --redact --no-banner \
            || echo "::warning::Gitleaks reported history findings (report-mode — not blocking; rotate any real secret, see ADR-0029 §4 / gate-lifecycle.md)"
