openapi: "3.1.0"

info:
  title: Enterprise AI System — REST API
  version: "0.1.0"
  description: |
    Synchronous REST API for the Enterprise AI System.
    High-volume async flows use Kafka events (see asyncapi.yaml).
  contact:
    name: Tech Lead
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary # SPDX custom ref; required by OpenAPI 3.1 license object

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.staging.example.com
    description: Staging
  - url: https://api.example.com
    description: Production

tags:
  - name: health
    description: Liveness and readiness probes
  - name: requests
    description: Domain request submission and status polling
  - name: hitl
    description: HITL approval queue management
  - name: runs
    description: Read-only per-request execution traces for the operator UI run view
  - name: governance
    description: Read-only SLO targets and error-budget status for the operator UI panel

paths:
  /health:
    get:
      tags: [health]
      operationId: health
      summary: Liveness probe
      description: Returns 200 if the process is alive. No dependency checks.
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [health]
      operationId: ready
      summary: Readiness probe
      description: Returns 200 if the service is ready to accept traffic.
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service not ready (dependency unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/requests:
    post:
      tags: [requests]
      operationId: submitRequest
      summary: Submit a domain request for async processing
      description: |
        Accepts a request and publishes it to the async pipeline.
        Returns 202 immediately. Poll GET /v1/requests/{request_id} for the result.
        PII in the request body is masked before the event is published.
        Send an optional `Idempotency-Key` header to make retries safe (SPEC-API-002): a repeat
        with the same body replays the original 202; a repeat with a different body returns 422
        `IDEMPOTENCY_KEY_REUSED`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: Opaque client key (printable ASCII, 8–200 chars) to de-duplicate retried submissions.
          schema:
            type: string
            minLength: 8
            maxLength: 200
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestIn"
      responses:
        "202":
          description: Request accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestOut"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/requests/{request_id}:
    get:
      tags: [requests]
      operationId: getRequestStatus
      summary: Poll request processing status
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestOut"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/hitl/status:
    get:
      tags: [hitl]
      operationId: hitlStatus
      summary: HITL subsystem health and queue depth
      responses:
        "200":
          description: HITL operational status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HITLStatusResponse"

  /v1/hitl/requests:
    get:
      tags: [hitl]
      operationId: listPendingRequests
      summary: List pending HITL approval requests
      description: >-
        Returns the pending requests awaiting an operator decision. Requires an
        operator JWT (role hitl-operator). Only the PII-masked context_summary is
        exposed per request; raw action_parameters never leave the gateway.
        Paginated (SPEC-API-003): optional limit/offset; X-Total-Count and an RFC-5988
        Link header are always set. The body remains an array (backward-compatible).
      parameters:
        - in: query
          name: limit
          required: false
          description: Page size (1–200). Defaults to the full queue.
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          description: Zero-based index of the first item to return.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Pending HITL requests (a page)
          headers:
            X-Total-Count:
              description: Total number of pending requests (before paging).
              schema:
                type: integer
            Link:
              description: RFC-5988 pagination links (rel="next"/"prev"), when further pages exist.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HITLRequestSummary"
        "422":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/hitl/requests/{request_id}/decision:
    post:
      tags: [hitl]
      operationId: submitDecision
      summary: Submit an APPROVE or REJECT decision
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionIn"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionOut"
        "404":
          description: Request not found or no longer pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs/{request_id}:
    get:
      tags: [runs]
      operationId: getRunTrace
      summary: Get a request's execution trace
      description: >-
        Returns the execution trace for a single submitted request: its state plus a timeline of
        audit events that can be REALLY associated with it. Requires a bearer JWT (read access).
        timeline_association names the strategy that built the timeline — the audit store is not
        indexed by the domain request_id, so an exact trace is only available when an event's
        metadata.request_id matches; otherwise timeline is empty and timeline_association is "none"
        (SPEC-API-004 §9.1, CLAUDE.md §3.6 — no fabricated linkage).
      security:
        - bearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Request execution trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTraceResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Run not found (unknown request_id or expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/governance/slo-status:
    get:
      tags: [governance]
      operationId: getSloStatus
      summary: SLO targets and honest observed status
      description: >-
        Returns every SLO defined in docs/sre/slo/slo.yaml with an honest observed block.
        Requires a bearer JWT (read access). target/target_ms/target_max and window are the real
        configured SLO definitions. observed.data_available is true only where a real in-process
        sample exists (api-gateway availability/error-rate, scoped as a process-lifetime sample);
        everywhere else it is false with a note — no observed number is ever fabricated (computing
        30-day SLO compliance / burn-rate needs a metrics-query layer the service lacks).
        SPEC-API-004, CLAUDE.md §3.6.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SLO targets and honest observed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLOStatusResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Operator JWT verified by src/api/rest/auth.py (read access for these endpoints).

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0

    RequestIn:
      type: object
      required: [request_text]
      properties:
        request_text:
          type: string
          minLength: 1
          maxLength: 4000
        priority:
          type: string
          enum: [low, normal, high]
          default: normal

    RequestOut:
      type: object
      required: [request_id, status, created_at, message]
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, completed, failed]
        created_at:
          type: string
          format: date-time
        message:
          type: string

    HITLStatusResponse:
      type: object
      required: [status, pending_count, message]
      properties:
        status:
          type: string
        pending_count:
          type: integer
        message:
          type: string

    DecisionIn:
      type: object
      # approver_id is intentionally NOT part of the contract: the approver identity is taken
      # from the authenticated operator JWT subject, never the request body (REM-001).
      required: [decision, rationale]
      properties:
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        rationale:
          type: string
          minLength: 10
          maxLength: 1000

    DecisionOut:
      type: object
      required: [request_id, decision, message]
      properties:
        request_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        message:
          type: string

    HITLRequestSummary:
      type: object
      required:
        [
          request_id,
          agent_id,
          action_type,
          context_summary,
          risk_score,
          status,
          created_at,
          expires_at,
        ]
      properties:
        request_id:
          type: string
          format: uuid
        agent_id:
          type: string
        action_type:
          type: string
        context_summary:
          type: string
          description: PII-masked summary shown to the reviewer (never raw action parameters).
        risk_score:
          type: number
          format: float
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXPIRED]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    TraceEvent:
      type: object
      description: One audit event taken verbatim from the immutable audit trail.
      required: [event_type, action, outcome, occurred_at]
      properties:
        event_type:
          type: string
        action:
          type: string
        outcome:
          type: string
        risk_score:
          type: number
          format: float
          nullable: true
        trace_id:
          type: string
          nullable: true
        occurred_at:
          type: string
          format: date-time

    RunTraceResponse:
      type: object
      required:
        [
          request_id,
          status,
          created_at,
          updated_at,
          timeline,
          timeline_association,
        ]
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, completed, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        result:
          type: object
          nullable: true
          additionalProperties: true
        error:
          type: string
          nullable: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TraceEvent"
        timeline_association:
          type: string
          description: >-
            Which real strategy built the timeline. metadata_request_id = exact
            metadata.request_id match; time_window_approximate = reserved (off by default);
            none = no event could be honestly associated (SPEC-API-004 §9.1).
          enum: [metadata_request_id, time_window_approximate, none]

    SLOObserved:
      type: object
      description: >-
        Honest observed block. When a real value cannot be computed, data_available is false and
        note explains why — a number is never fabricated (CLAUDE.md §3.6).
      required: [data_available]
      properties:
        data_available:
          type: boolean
        value:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        scope:
          type: string
          nullable: true
          description: e.g. "process_lifetime" — NOT the 30-day SLO window.
        note:
          type: string
          nullable: true

    SLOItemStatus:
      type: object
      required: [name, sli_type, observed]
      properties:
        name:
          type: string
        sli_type:
          type: string
        description:
          type: string
          nullable: true
        target:
          type: number
          nullable: true
        target_ms:
          type: number
          nullable: true
        target_max:
          type: number
          nullable: true
        window:
          type: string
          nullable: true
        observed:
          $ref: "#/components/schemas/SLOObserved"

    SLOServiceStatus:
      type: object
      required: [name, slos]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        slos:
          type: array
          items:
            $ref: "#/components/schemas/SLOItemStatus"

    SLOStatusResponse:
      type: object
      required: [generated_at, services]
      properties:
        source_version:
          type: string
          nullable: true
          description: Top-level version from docs/sre/slo/slo.yaml.
        generated_at:
          type: string
          format: date-time
        services:
          type: array
          items:
            $ref: "#/components/schemas/SLOServiceStatus"

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    Error:
      # The single error envelope returned by every non-2xx response (ADR-0076 / SPEC-API-001).
      type: object
      required: [status, code, title, request_id]
      properties:
        status:
          type: integer
          description: Mirrors the HTTP status code.
        code:
          type: string
          description: Stable, screaming-snake error code clients branch on (adding is non-breaking).
          enum:
            [
              VALIDATION_ERROR,
              BAD_REQUEST,
              UNAUTHORIZED,
              FORBIDDEN,
              NOT_FOUND,
              CONFLICT,
              RATE_LIMITED,
              UNAVAILABLE,
              INTERNAL_ERROR,
              IDEMPOTENCY_KEY_REUSED,
            ]
        title:
          type: string
          description: Short, human-readable, stable for a given code.
        detail:
          type: string
          description: Instance-specific message; PII-masked.
        request_id:
          type: string
          description: Correlation id; echoed in the X-Request-ID response header.
        trace_id:
          type: string
          description: OpenTelemetry trace id for support correlation.
        errors:
          type: array
          description: Field-level validation problems (422).
          items:
            $ref: "#/components/schemas/FieldError"
      example:
        status: 404
        code: NOT_FOUND
        title: Not Found
        detail: Request 550e8400-… not found.
        request_id: 0af7-1c80-4e2a-9f12
        trace_id: 0af7651916cd43dd8448eb211c80319c

  headers:
    XRequestId:
      description: Correlation id, set on every response (accepted inbound, else generated). ADR-0076.
      schema:
        type: string
