name: code-check
description: PR gate — all gates must pass before merge is allowed
version: "1.0"

gates:
  - name: lint
    command: "uv run ruff check . && uv run ruff format --check . && uv run mypy src/"
    blocking: true
    failure_message: "Linting or type-check failed. Run 'make lint' locally to fix."

  - name: unit-tests
    command: "uv run pytest tests/unit/ --cov=src --cov-fail-under=80 -q"
    blocking: true
    failure_message: "Unit tests failed or coverage < 80%. All tests must pass and coverage must be ≥ 80% before merge."

  - name: sast
    command: "uv run bandit -r src/ -ll -x tests/"
    blocking: true
    failure_message: "Bandit found MEDIUM or HIGH severity findings. Address all findings before merge (see skills/devsecops/secret-scanning.md)."

  - name: secret-detection
    command: "detect-secrets scan --baseline .secrets.baseline"
    blocking: true
    failure_message: "Potential secrets detected. Review findings with 'detect-secrets audit' and update baseline after false-positive triage."

  - name: pii-scan
    command: >
      uv run pytest tests/security/test_pii_leakage.py -q &&
      ! grep -rqE '(fake@example\.com|000\.000\.000-00|192\.0\.2\.[0-9])' tests/fixtures/
    blocking: true
    failure_message: "Real PII detected in test fixtures. Replace with synthetic placeholders (see specs/privacy/pii-inventory.md)."

  - name: spec-compliance
    command: >
      bash -c "
        if [ -n \"${PR_BODY_FILE:-}\" ] && [ -f \"${PR_BODY_FILE}\" ]; then
          grep -qE 'specs/[a-z/._-]+\.md' \"${PR_BODY_FILE}\" &&
            echo 'Spec reference found.' ||
            { echo 'No spec reference found in PR body.'; exit 1; }
        else
          echo 'PR_BODY_FILE not set — spec compliance check skipped (set it in CI).';
          exit 0
        fi
      "
    blocking: true # REM-008 — enforced (mirrors the CI 'Spec reference' gate in pr-governance.yml)
    failure_message: >
      No spec reference found in the PR body. Add a 'Referenced Spec: specs/...' line.
      In CI, ensure PR_BODY_FILE points to a file containing the PR description body.
